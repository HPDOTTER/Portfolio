<section
    class="portfolio-item"
    [class.reversed]="isReversed"
    [class]="'item-' + index"
    [attr.data-aos]="isReversed ? 'fade-left' : 'fade-right'"
    [attr.data-aos-delay]="(index + 1) * 80"
    [attr.data-aos-duration]="760"
    [attr.data-aos-offset]="120"
>
    <div class="image-section">
        <img [src]="image" [alt]="title" class="project-image" />
    </div>

    <div class="content-section">
        <h3>{{ title }}</h3>
        <p class="project-description">{{ description }}</p>

        <div class="technologies">
            <ng-container *ngFor="let tech of technologies; let last = last">
                <span class="tech-item">{{ tech }}</span>
                <span *ngIf="!last"> | </span>
            </ng-container>
        </div>

        <!-- Links -->
        <div class="project-links">
            <a
                [href]="liveLink"
                target="_blank"
                class="btn-link primary"
                *ngIf="liveLink"
                >Live Test</a
            >
            <a
                [href]="githubLink"
                target="_blank"
                class="btn-link"
                *ngIf="githubLink"
                >GitHub</a
            >
        </div>
    </div>
</section>
